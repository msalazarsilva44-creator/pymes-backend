<!-- Script para validar botón de retroceder - INLINE MEJORADO -->
<script>
    console.log('🔴 SCRIPT DE RETROCEDER CARGANDO...');
    
    (function() {
        'use strict';
        
        console.log('🟢 IIFE EJECUTÁNDOSE...');
        
        function isAuthenticated() {
            const token = localStorage.getItem('auth_token');
            const userData = localStorage.getItem('user_data');
            console.log('🔍 Verificando autenticación:', {token: !!token, userData: !!userData});
            return token !== null && userData !== null;
        }
        
        function getUserName() {
            const userData = localStorage.getItem('user_data');
            if (userData) {
                try {
                    const user = JSON.parse(userData);
                    return user.name || 'Usuario';
                } catch (e) {
                    return 'Usuario';
                }
            }
            return 'Usuario';
        }
        
        function getUserRole() {
            return localStorage.getItem('user_role') || 'usuario';
        }
        
        function logout() {
            console.log('🚪 Cerrando sesión...');
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user_data');
            localStorage.removeItem('user_role');
            localStorage.removeItem('empresa_data');
            window.location.href = '/login';
        }
        
        function init() {
            console.log('🚀 INICIANDO BackButtonLogout...');
            
            if (!isAuthenticated()) {
                console.log('⚠️ Usuario NO autenticado');
                return;
            }
            
            console.log('✅ Usuario AUTENTICADO');
            console.log('👤 Usuario:', getUserName());
            console.log('🎭 Rol:', getUserRole());
            
            // Crear modal
            const modal = document.createElement('div');
            modal.id = 'logout-modal';
            modal.style.cssText = 'display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;';
            modal.innerHTML = `
                <div style="background:white; border-radius:0.5rem; padding:1.5rem; max-width:28rem; width:90%; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);">
                    <div style="display:flex; gap:1rem; margin-bottom:1rem;">
                        <div style="width:3rem; height:3rem; background:#FEF3C7; border-radius:9999px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                            <span style="font-size:1.5rem;">⚠️</span>
                        </div>
                        <div style="flex:1;">
                            <h3 style="font-size:1.125rem; font-weight:700; color:#111; margin-bottom:0.25rem;">¿Cerrar sesión?</h3>
                            <p style="font-size:0.875rem; color:#6B7280;">Estás intentando salir. ¿Deseas cerrar tu sesión?</p>
                        </div>
                    </div>
                    <div style="background:#DBEAFE; border:1px solid #BFDBFE; border-radius:0.5rem; padding:0.75rem; margin-bottom:1rem;">
                        <p style="font-size:0.875rem; color:#1E40AF;"><strong>Usuario:</strong> <span id="modal-user">${getUserName()}</span></p>
                        <p style="font-size:0.875rem; color:#1E3A8A;"><strong>Rol:</strong> <span id="modal-role">${getUserRole()}</span></p>
                    </div>
                    <div style="display:flex; gap:0.75rem;">
                        <button id="btn-cancel" style="flex:1; background:#E5E7EB; color:#374151; font-weight:600; padding:0.75rem 1.5rem; border-radius:0.5rem; border:none; cursor:pointer;">
                            No, quedarme
                        </button>
                        <button id="btn-logout" style="flex:1; background:#DC2626; color:white; font-weight:600; padding:0.75rem 1.5rem; border-radius:0.5rem; border:none; cursor:pointer;">
                            Sí, cerrar sesión
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            console.log('✅ Modal creado');
            
            // AGREGAR ENTRADAS AL HISTORIAL
            console.log('📝 Agregando entradas al historial...');
            
            // Agregar múltiples entradas para asegurar que hay historial
            history.pushState({backButtonProtection: true, page: 1}, '', location.href);
            history.pushState({backButtonProtection: true, page: 2}, '', location.href);
            
            console.log('📌 Entradas agregadas al historial');
            console.log('📊 History length:', history.length);
            
            // Variable para controlar el modal
            let modalVisible = false;
            
            // Evento popstate
            console.log('📝 Registrando evento popstate...');
            window.addEventListener('popstate', function(event) {
                console.log('⬅️ ¡¡¡POPSTATE DETECTADO!!!');
                console.log('Estado:', event.state);
                console.log('History length:', history.length);
                
                if (!isAuthenticated()) {
                    console.log('⚠️ No autenticado, permitiendo navegación');
                    return;
                }
                
                // Prevenir navegación y mostrar modal
                console.log('🛑 Mostrando modal...');
                event.preventDefault();
                event.stopPropagation();
                
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
                modalVisible = true;
                
                // Agregar entrada de nuevo al historial
                history.pushState({backButtonProtection: true, page: Date.now()}, '', location.href);
                console.log('📌 Página mantenida en historial');
            }, true); // ← usar capture phase
            
            // Botones
            document.getElementById('btn-cancel').onclick = function() {
                console.log('✅ Usuario canceló');
                modal.style.display = 'none';
                document.body.style.overflow = '';
                modalVisible = false;
            };
            
            document.getElementById('btn-logout').onclick = function() {
                console.log('🔴 Usuario confirmó logout');
                logout();
            };
            
            // Cerrar con click fuera
            modal.onclick = function(e) {
                if (e.target === modal) {
                    console.log('🖱️ Click fuera del modal');
                    modal.style.display = 'none';
                    document.body.style.overflow = '';
                    modalVisible = false;
                }
            };
            
            // Cerrar con ESC
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modal.style.display === 'flex') {
                    console.log('⌨️ ESC presionado');
                    modal.style.display = 'none';
                    document.body.style.overflow = '';
                    modalVisible = false;
                }
            });
            
            console.log('🎉 BackButtonLogout COMPLETAMENTE INICIALIZADO');
        }
        
        // Ejecutar
        if (document.readyState === 'loading') {
            console.log('⏳ Esperando DOMContentLoaded...');
            document.addEventListener('DOMContentLoaded', init);
        } else {
            console.log('✅ DOM ya cargado, ejecutando inmediatamente');
            init();
        }
        
    })();
    
    console.log('🔵 SCRIPT DE RETROCEDER TERMINÓ DE CARGAR');
</script>
